<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dự án mô hình nhà sử dụng năng lượng mặt trời</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    display:flex;
    height:100vh;
    background:#F4F1E8;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    background:#4CAF50;
    color:white;
    padding:20px;
}
.sidebar h2{
    font-size:18px;
}
.sidebar button{
    width:100%;
    padding:8px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#FFD600;
    cursor:pointer;
}

/* MAIN CHAT */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

header{
    background:white;
    padding:15px;
    font-weight:bold;
    font-size:18px;
    border-bottom:1px solid #ddd;
}

.chat-container{
    flex:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:70%;
    padding:12px 16px;
    margin:8px 0;
    border-radius:16px;
    line-height:1.5;
}

.user{
    align-self:flex-end;
    background:#E8F5E9;
}

.bot{
    background:#C8E6C9;
    border-left:5px solid #FFD600;
}

/* INPUT */
.input-area{
    display:flex;
    padding:10px;
    background:white;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

button.send{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#FFD600;
    font-weight:bold;
    cursor:pointer;
}

/* ICONS */
.icons{
    text-align:center;
    margin-top:20px;
    font-size:50px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>Dự án NLMT</h2>
    <button onclick="clearChat()">Xóa lịch sử</button>
    <div class="icons">
        🌬️<br>💡
    </div>
</div>

<div class="main">
<header>Dự án mô hình nhà sử dụng năng lượng mặt trời</header>

<div class="chat-container" id="chat"></div>

<div class="input-area">
<input type="text" id="questionInput" placeholder="Nhập câu hỏi...">
<button class="send" onclick="sendMessage()">Gửi</button>
</div>
</div>

<script>

const answers = {

"tên dự án": "Tên dự án là: Dự án mô hình nhà sử dụng năng lượng mặt trời.",

"khái quát": "Đây là dự án thiết kế mô hình nhà sử dụng năng lượng mặt trời nhằm minh họa cách tạo ra và sử dụng điện sạch trong đời sống thực tế.",

"mục tiêu": "Mục tiêu là ứng dụng năng lượng tái tạo vào mô hình nhà ở và nâng cao ý thức bảo vệ môi trường.",

"ý tưởng": "Ý tưởng xuất phát từ thực trạng ô nhiễm môi trường và sự phụ thuộc vào điện lưới truyền thống.",

"lĩnh vực": "Dự án thuộc lĩnh vực năng lượng tái tạo và giáo dục bảo vệ môi trường.",

"đối tượng": "Dự án hướng đến học sinh và cộng đồng quan tâm đến môi trường.",

"ý nghĩa": "Dự án có ý nghĩa giáo dục, giúp người học hiểu và trải nghiệm thực tế về năng lượng sạch.",

"thông điệp": "Thông điệp chính: Hãy sử dụng năng lượng sạch để bảo vệ tương lai.",

"giá trị thực tiễn": "Dự án giúp kiểm chứng tính khả thi của hệ thống năng lượng mặt trời ở quy mô nhỏ.",

"giá trị nhận thức": "Giúp nâng cao ý thức tiết kiệm năng lượng và trách nhiệm với cộng đồng.",

"ứng dụng": "Có thể áp dụng vào nhà thật sau khi điều chỉnh quy mô và công suất.",

"lợi ích": "Giúp giảm phụ thuộc vào điện lưới và nhiên liệu hóa thạch, giảm ô nhiễm môi trường.",

"bảo vệ môi trường": "Dự án góp phần giảm khí thải và khuyến khích sử dụng năng lượng tái tạo.",

"mạch điện": "Mạch điện có giá 200.000đ và có vai trò điều khiển dòng điện trong hệ thống.",

"đèn led": "Đèn LED mini giá 5.000đ dùng để minh họa nguồn điện được tạo ra.",

"tấm pin": "Tấm pin năng lượng mặt trời mini giá 60.000đ/2 chiếc.",

"relay": "Module relay 1 kênh 5V giá 16.000đ, giúp đóng/ngắt mạch tự động.",

"cảm biến": "Module cảm biến ánh sáng giá 40.000đ giúp tự động bật/tắt đèn.",

"mạch sạc": "Mạch sạc pin năng lượng mặt trời giá 40.000đ.",

"pin 18650": "Pin 18650 giá 20.000đ dùng để lưu trữ điện năng.",

"đế pin": "Đế pin 18650 giá 12.000đ.",

"công tắc": "Công tắc bập bênh giá 7.000đ.",

"formex": "Formex 3mm giá 30.000đ dùng làm mô hình nhà.",

"đế mô hình": "Đế mô hình được tái sử dụng từ bìa số, thể hiện tinh thần tiết kiệm và bảo vệ môi trường.",

"tổng chi phí": "Tổng chi phí mô hình khoảng 430.000đ bao gồm: mạch điện, LED, tấm pin mặt trời, relay, cảm biến, mạch sạc, pin 18650, đế pin, công tắc và vật liệu Formex.",

"giá tiền": "Tổng chi phí thực hiện mô hình khoảng 430.000đ cho toàn bộ linh kiện và vật liệu.",

"mô hình học tập trải nghiệm": "Mô hình học tập trải nghiệm của David Kolb cho rằng con người học hiệu quả nhất thông qua trải nghiệm thực tế. Chu trình gồm 4 bước: Trải nghiệm cụ thể, Quan sát – phản ánh, Khái quát hóa và Vận dụng thử nghiệm. Dự án này áp dụng mô hình đó khi người học trực tiếp lắp ráp và quan sát hoạt động của hệ thống.",

"kolb": "Theo David Kolb, học tập trải nghiệm gồm 4 bước: Trải nghiệm, Phản ánh, Khái quát hóa và Vận dụng. Dự án mô hình năng lượng mặt trời là ví dụ điển hình của phương pháp này.",

"điểm sáng tạo": "Điểm sáng tạo là kết hợp mô hình nhà ở với hệ thống điện mặt trời thu nhỏ hoạt động thực tế.",

"khả thi": "Mô hình chứng minh rằng hệ thống năng lượng mặt trời có thể hoạt động hiệu quả ở quy mô nhỏ.",

"hạn chế": "Hạn chế là công suất nhỏ và phụ thuộc vào cường độ ánh sáng.",

"cải tiến": "Có thể cải tiến bằng cách tăng số lượng tấm pin hoặc nâng cấp hệ thống lưu trữ điện.",

"bền vững": "Dự án mang tính bền vững vì sử dụng nguồn năng lượng tái tạo không gây ô nhiễm."
};

const chat = document.getElementById("chat");

function typeEffect(element, text){
    let i=0;
    element.innerHTML="";
    const interval=setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;
        if(i>=text.length) clearInterval(interval);
    },15);
}

function sendMessage(){
    const input=document.getElementById("questionInput");
    const text=input.value.toLowerCase();
    if(text.trim()==="") return;

    const userMsg=document.createElement("div");
    userMsg.className="message user";
    userMsg.innerText=input.value;
    chat.appendChild(userMsg);

    const botMsg=document.createElement("div");
    botMsg.className="message bot";

    let response="Xin lỗi, mình chưa có câu trả lời cho câu hỏi này.";

    for(let key in answers){
        if(text.includes(key)){
            response=answers[key];
            break;
        }
    }

    chat.appendChild(botMsg);
    typeEffect(botMsg,response);

    saveChat();
    input.value="";
    chat.scrollTop=chat.scrollHeight;
}

function saveChat(){
    localStorage.setItem("solarChat", chat.innerHTML);
}

function loadChat(){
    if(localStorage.getItem("solarChat")){
        chat.innerHTML=localStorage.getItem("solarChat");
    }
}

function clearChat(){
    localStorage.removeItem("solarChat");
    chat.innerHTML="";
}

loadChat();

</script>

</body>
</html>
